name: Manual Build

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  build-java-25:
    name: Build and Test (Java 25)
    runs-on:
      group: Default
      labels: runner

    env:
      JAVA_VERSION: 25
      RUNNER_DESCRIPTION: "Java 25 Compatibility Test"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: corretto

      - name: Cache Maven local repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-local-repo-${{ runner.os }}-java25-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-local-repo-${{ runner.os }}-java25-

      - name: Clean Maven Wrapper Distributions
        run: rm -rf ~/.m2/wrapper/dists/

      - name: Verify Java Runtime
        run: |
          echo "Running with Java $JAVA_VERSION - $RUNNER_DESCRIPTION"
          java -version
          javac -version

      - name: Verify formatting and license headers
        run: ./mvnw spotless:check

      - name: Build and Test
        run: ./build.sh maven --skip-static-analysis
        env:
          MAVEN_OPTS: "-Xmx2g -XX:+UseG1GC"

      - name: Verify Compatibility
        run: |
          echo "Java $JAVA_VERSION - $RUNNER_DESCRIPTION: Compatibility verified"

      - name: Verify Threading Mode
        run: |
          echo "Testing complete for: $RUNNER_DESCRIPTION"
          echo "Java version used: $JAVA_VERSION"

  build-java-21:
    name: Build and Test (Java 21)
    runs-on:
      group: Default
      labels: runner
    needs: build-java-25

    env:
      JAVA_VERSION: 21
      RUNNER_DESCRIPTION: "Java 21 Compatibility Test"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: corretto

      - name: Cache Maven local repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-local-repo-${{ runner.os }}-java21-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-local-repo-${{ runner.os }}-java21-

      - name: Clean Maven Wrapper Distributions
        run: rm -rf ~/.m2/wrapper/dists/

      - name: Verify Java Runtime
        run: |
          echo "Running with Java $JAVA_VERSION - $RUNNER_DESCRIPTION"
          java -version
          javac -version

      - name: Verify formatting and license headers
        run: ./mvnw spotless:check

      - name: Build and Test
        run: ./build.sh maven
        env:
          MAVEN_OPTS: "-Xmx2g -XX:+UseG1GC"

      - name: Verify Compatibility
        run: |
          echo "Java $JAVA_VERSION - $RUNNER_DESCRIPTION: Compatibility verified"

      - name: Verify Threading Mode
        run: |
          echo "Testing complete for: $RUNNER_DESCRIPTION"
          echo "Java version used: $JAVA_VERSION"

  build-java-17:
    name: Build and Test (Java 17)
    runs-on:
      group: Default
      labels: runner
    needs: build-java-21

    env:
      JAVA_VERSION: 17
      RUNNER_DESCRIPTION: "Java 17 Compatibility Test"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: corretto

      - name: Cache Maven local repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-local-repo-${{ runner.os }}-java17-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-local-repo-${{ runner.os }}-java17-

      - name: Clean Maven Wrapper Distributions
        run: rm -rf ~/.m2/wrapper/dists/

      - name: Verify Java Runtime
        run: |
          echo "Running with Java $JAVA_VERSION - $RUNNER_DESCRIPTION"
          java -version
          javac -version

      - name: Verify formatting and license headers
        run: ./mvnw spotless:check

      - name: Build and Test
        run: ./build.sh maven
        env:
          MAVEN_OPTS: "-Xmx2g -XX:+UseG1GC"

      - name: Verify Compatibility
        run: |
          echo "Java $JAVA_VERSION - $RUNNER_DESCRIPTION: Compatibility verified"

      - name: Verify Threading Mode
        run: |
          echo "Testing complete for: $RUNNER_DESCRIPTION"
          echo "Java version used: $JAVA_VERSION"

  build-gradle-plugin:
    name: Build Gradle Plugin
    runs-on:
      group: Default
      labels: runner
    needs: build-java-17

    env:
      JAVA_VERSION: 17
      RUNNER_DESCRIPTION: "Gradle Plugin Build"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: corretto

      - name: Verify Java Runtime
        run: |
          echo "Running with Java $JAVA_VERSION - $RUNNER_DESCRIPTION"
          java -version
          javac -version

      - name: Build Gradle Plugin
        run: |
          export JAVA_17_HOME="$JAVA_HOME"
          ./build.sh gradle-plugin
        env:
          MAVEN_OPTS: "-Xmx2g -XX:+UseG1GC"

      - name: Verify Compatibility
        run: |
          echo "Java $JAVA_VERSION - $RUNNER_DESCRIPTION: Compatibility verified"

      - name: Verify Threading Mode
        run: |
          echo "Testing complete for: $RUNNER_DESCRIPTION"
          echo "Java version used: $JAVA_VERSION"
