name: Build

permissions:
  contents: read

on:
  push:
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build and Test (Java ${{ matrix.java-version }})
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        java-version: [17, 21]
        include:
          - java-version: 17
            description: "Java 17 Compatibility Test"
            runner-description: "Platform Thread Mode"
          - java-version: 21
            description: "Java 21+ Performance Test"
            runner-description: "Virtual Thread Mode"

    env:
      JAVA_VERSION: ${{ matrix.java-version }}
      RUNNER_DESCRIPTION: ${{ matrix.runner-description }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: corretto
          cache: maven
          cache-dependency-path: '**/pom.xml'

      - name: Verify Java Runtime
        run: |
          echo "Running with Java $JAVA_VERSION - $RUNNER_DESCRIPTION"
          java -version
          javac -version

      - name: Build and Test
        run: ./mvnw -B clean verify
        env:
          MAVEN_OPTS: "-Xmx2g -XX:+UseG1GC"

      - name: Verify Compatibility
        run: |
          echo "Java $JAVA_VERSION - $RUNNER_DESCRIPTION: Compatibility verified"

      - name: Verify Threading Mode
        run: |
          echo "Testing complete for: $RUNNER_DESCRIPTION"
          echo "Java version used: $JAVA_VERSION"
